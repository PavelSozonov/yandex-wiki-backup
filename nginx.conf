events {}

http {
    # Включаем MIME types для правильной подачи файлов
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;
        
        # Статические ресурсы (CSS, JS, изображения)
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Обработка HTML файлов (приоритет выше чем у location /)
        location ~* \.html$ {
            root /usr/share/nginx/html;
            default_type text/html;
        }
        
        # Обработка файлов без расширения как HTML (для страниц)
        location ~ ^(.+)/([^/]+)$ {
            root /usr/share/nginx/html;
            default_type text/html;
            try_files $uri $uri.html =404;
        }
        
        # Специальная обработка для index файлов в директориях
        location ~ ^(.+)/$ {
            root /usr/share/nginx/html;
            default_type text/html;
            try_files $uri ${uri}index.html ${uri}.html =404;
        }
        
        # Редирект для директорий без завершающего слэша
        location ~ ^(.+[^/])$ {
            if (-d $request_filename) {
                return 301 $uri/;
            }
        }
        
        # Основная логика для всех запросов
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/index.html $uri.html @autoindex;
        }
        
        location @redirect {
            return 301 $uri/;
        }
        
        # Автоиндекс для директорий
        location @autoindex {
            root /usr/share/nginx/html;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }
    }
}
