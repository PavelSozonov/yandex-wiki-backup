events {}

http {
    # Включаем MIME types для правильной подачи файлов
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;
        
        # Статические ресурсы (CSS, JS, изображения)
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Обработка HTML файлов (приоритет выше чем у location /)
        location ~* \.html$ {
            root /usr/share/nginx/html;
            add_header Content-Type "text/html; charset=utf-8";
        }
        
        # Специальная обработка для index файлов в директориях
        location ~ ^(.+)/$ {
            root /usr/share/nginx/html;
            try_files $uri ${uri}index.html =404;
            add_header Content-Type "text/html; charset=utf-8";
        }
        
        # Основная логика для всех запросов
        location / {
            root /usr/share/nginx/html;
            index index.html;
            
            # Пробуем найти файл с .html и без
            try_files $uri $uri.html $uri/index.html @autoindex;
        }
        
        # Автоиндекс для директорий
        location @autoindex {
            root /usr/share/nginx/html;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }
    }
}
